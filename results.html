<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Results · Market Returns</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .results-container {
            padding: 1.5rem 0;
        }
        .round-results {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2ebf3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .round-results h3 {
            color: #0b2a42;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .round-results .year-badge {
            background: #1f3a57;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .market-returns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.8rem;
            margin-top: 0.8rem;
        }
        .return-item {
            background: #f8fbfe;
            padding: 0.6rem 1rem;
            border-radius: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e8eef6;
        }
        .return-item .asset-name {
            font-weight: 500;
            color: #1a3b55;
            font-size: 0.85rem;
        }
        .return-item .return-value {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .return-item .return-value.positive { color: #0b6e3f; }
        .return-item .return-value.negative { color: #b22234; }
        .no-data {
            text-align: center;
            color: #6b8a9e;
            padding: 3rem;
            font-size: 1.1rem;
        }
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: 1px solid #e2ebf3;
            text-align: center;
        }
        .stat-card .stat-label {
            color: #6b8a9e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b2a42;
            margin-top: 0.3rem;
        }
        .stat-card .stat-value.positive { color: #0b6e3f; }
        .stat-card .stat-value.negative { color: #b22234; }
        .return-summary {
            margin-bottom: 0.5rem;
            padding: 0.5rem 1rem;
            background: #eef5fc;
            border-radius: 0.8rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }
        .return-summary span { font-weight: 500; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <a href="index.html">🏠 Game</a>
            <a href="results.html" class="active">📊 Results</a>
            <a href="portfolio.html">📈 Portfolio</a>
            <a href="instructions.html">📖 Instructions</a>
        </div>

        <h1>📊 Market Returns by Round</h1>
        <div class="sub">Historical returns for each asset class across all 7 rounds</div>

        <div id="resultsContainer" class="results-container">
            <!-- Rendered by JavaScript -->
        </div>

        <div class="footnote">Returns are revealed after each round · all data stored in your browser</div>
    </div>

    <script>
        function loadResults() {
            const container = document.getElementById('resultsContainer');
            
            // Try to get data from multiple sources
            let history = [];
            let allReturns = [];
            
            // 1. Try from gameData (most complete)
            const gameDataStr = localStorage.getItem('gameData');
            if (gameDataStr) {
                try {
                    const gameData = JSON.parse(gameDataStr);
                    history = gameData.history || [];
                    allReturns = gameData.allRoundReturns || [];
                    console.log('📊 Loaded from gameData:', { history: history.length, returns: allReturns.length });
                } catch(e) {}
            }
            
            // 2. If empty, try individual storage
            if (history.length === 0) {
                const historyStr = localStorage.getItem('gameHistory');
                if (historyStr) {
                    try {
                        history = JSON.parse(historyStr);
                        console.log('📊 Loaded from gameHistory:', history.length);
                    } catch(e) {}
                }
            }
            
            if (allReturns.length === 0) {
                const returnsStr = localStorage.getItem('allRoundReturns');
                if (returnsStr) {
                    try {
                        allReturns = JSON.parse(returnsStr);
                        console.log('📊 Loaded from allRoundReturns:', allReturns.length);
                    } catch(e) {}
                }
            }

            // If we have returns data, use it
            if (allReturns.length > 0) {
                let html = '';
                
                // Summary stats
                const totalRounds = allReturns.length;
                let totalReturn = 0;
                let lastCapital = 10000;
                
                allReturns.forEach((round, index) => {
                    totalReturn += round.totalReturn || 0;
                    if (index === allReturns.length - 1) {
                        lastCapital = round.newCapital || 10000;
                    }
                });
                
                const totalReturnPct = ((lastCapital / 10000) - 1) * 100;
                
                html += `
                    <div class="summary-stats">
                        <div class="stat-card">
                            <div class="stat-label">📊 Rounds Completed</div>
                            <div class="stat-value">${totalRounds} / 7</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">💰 Final Capital</div>
                            <div class="stat-value">$${lastCapital.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">📈 Total Return</div>
                            <div class="stat-value ${totalReturn >= 0 ? 'positive' : 'negative'}">
                                ${totalReturn >= 0 ? '+' : ''}$${totalReturn.toFixed(2)}
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">📈 Return %</div>
                            <div class="stat-value ${totalReturnPct >= 0 ? 'positive' : 'negative'}">
                                ${totalReturnPct >= 0 ? '+' : ''}${totalReturnPct.toFixed(2)}%
                            </div>
                        </div>
                    </div>
                `;

                // Show each round
                allReturns.forEach((round, index) => {
                    const roundNum = index + 1;
                    const year = round.year || 'Unknown';
                    const label = round.label || '';
                    const returns = round.returns || {};
                    const roundReturn = round.totalReturn || 0;
                    const roundReturnPct = round.returnPercent || 0;

                    html += `
                        <div class="round-results">
                            <h3>
                                <span>Round ${roundNum}</span>
                                <span class="year-badge">${year} · ${label}</span>
                            </h3>
                            <div class="return-summary">
                                <span>💰 Return: ${roundReturn >= 0 ? '+' : ''}$${roundReturn.toFixed(2)}</span>
                                <span>📈 Return %: ${roundReturnPct >= 0 ? '+' : ''}${roundReturnPct.toFixed(2)}%</span>
                                <span>🔁 New Capital: $${round.newCapital?.toFixed(2) || 'N/A'}</span>
                            </div>
                            <div class="market-returns-grid">
                    `;

                    const sortedAssets = Object.keys(returns).sort();
                    sortedAssets.forEach(asset => {
                        const ret = returns[asset];
                        const sign = ret >= 0 ? '+' : '';
                        const className = ret >= 0 ? 'positive' : 'negative';
                        html += `
                            <div class="return-item">
                                <span class="asset-name">${asset}</span>
                                <span class="return-value ${className}">${sign}${ret.toFixed(1)}%</span>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                return;
            }

            // Fallback: show from history
            if (history.length > 0) {
                let html = '';
                history.forEach((h, index) => {
                    const roundNum = index + 1;
                    const returns = h.returns || {};
                    
                    html += `
                        <div class="round-results">
                            <h3>
                                <span>Round ${roundNum}</span>
                                <span class="year-badge">${h.year || 'Unknown'}</span>
                            </h3>
                            <div class="return-summary">
                                <span>💰 Return: ${h.returnAmount >= 0 ? '+' : ''}$${h.returnAmount?.toFixed(2) || '0.00'}</span>
                                <span>📈 Return %: ${h.returnPercent >= 0 ? '+' : ''}${h.returnPercent?.toFixed(2) || '0.00'}%</span>
                                <span>🔁 New Capital: $${h.newCapital?.toFixed(2) || 'N/A'}</span>
                            </div>
                            <div class="market-returns-grid">
                    `;

                    if (Object.keys(returns).length > 0) {
                        const sortedAssets = Object.keys(returns).sort();
                        sortedAssets.forEach(asset => {
                            const ret = returns[asset];
                            const sign = ret >= 0 ? '+' : '';
                            const className = ret >= 0 ? 'positive' : 'negative';
                            html += `
                                <div class="return-item">
                                    <span class="asset-name">${asset}</span>
                                    <span class="return-value ${className}">${sign}${ret.toFixed(1)}%</span>
                                </div>
                            `;
                        });
                    } else {
                        html += `<p style="color: #6b8a9e; grid-column: 1 / -1; text-align: center;">📊 Returns data available in game data</p>`;
                    }

                    html += `
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                return;
            }

            // No data at all
            container.innerHTML = `
                <div class="no-data">
                    <p>📭 No results yet. Play the game first!</p>
                    <p style="font-size:0.9rem; margin-top:0.5rem;">Complete at least one round in the Game tab to see results here.</p>
                    <p style="font-size:0.9rem; margin-top:0.5rem; color:#2563eb;">
                        <a href="index.html" style="color:#2563eb; text-decoration:underline;">→ Go to Game</a>
                    </p>
                </div>
            `;
        }

        // Auto-refresh data when returning to this page
        document.addEventListener('DOMContentLoaded', loadResults);
        
        // Listen for storage changes (if data is updated in another tab)
        window.addEventListener('storage', function(e) {
            if (e.key === 'gameData' || e.key === 'gameHistory' || e.key === 'allRoundReturns') {
                console.log('🔄 Data updated, refreshing results...');
                loadResults();
            }
        });
    </script>
</body>
</html>
